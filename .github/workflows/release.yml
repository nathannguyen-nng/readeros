name: Compile Release
on:
  push:
    tags:
      - '*-readeros'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout --force FETCH_HEAD
          git submodule update --init --recursive

      - name: Install PlatformIO Core
        run: |
          set -euo pipefail
          python3 -m pip install --user -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip || \
            python3 -m pip install --user --break-system-packages -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build readerOS release
        env:
          VCODEX_RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          pio run -e gh_release | tee "artifacts/${GITHUB_REF_NAME}-build.log"

      - name: Report firmware budget
        run: |
          python3 scripts/firmware_budget_report.py \
            --tag "${GITHUB_REF_NAME}" \
            --build-log "artifacts/${GITHUB_REF_NAME}-build.log" \
            --fail-over-budget

      - name: Validate packaged release artifact
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          artifact="artifacts/${tag}.bin"
          metadata="artifacts/${tag}.json"

          test -f "${artifact}" || {
            echo "Expected packaged firmware ${artifact} was not created."
            echo "Available artifacts:"
            find artifacts -maxdepth 1 -type f -print || true
            exit 1
          }
          test -f "${metadata}" || {
            echo "Expected metadata ${metadata} was not created."
            exit 1
          }

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          metadata = json.loads(Path(f"artifacts/{tag}.json").read_text(encoding="utf-8"))
          if metadata.get("artifactName") != f"{tag}.bin":
              raise SystemExit(f"metadata artifactName mismatch: {metadata.get('artifactName')} != {tag}.bin")
          if metadata.get("environment") != "gh_release":
              raise SystemExit(f"unexpected release environment: {metadata.get('environment')}")
          print(f"Validated {metadata['artifactName']} ({metadata['firmwareBytes']} bytes)")
          PY

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          artifact="artifacts/${tag}.bin"
          metadata="artifacts/${tag}.json"
          notes_file="$(mktemp)"

          {
            echo "readerOS firmware release ${tag}."
            echo
            echo "The browser auto-flash page is committed with the matching local firmware copy for this tag."
          } > "${notes_file}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" \
              "${artifact}#${tag}.bin" \
              --clobber
          else
            gh release create "${tag}" \
              "${artifact}#${tag}.bin" \
              --verify-tag \
              --title "${tag}" \
              --notes-file "${notes_file}"
          fi
